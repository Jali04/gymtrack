<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymTrack">
<meta name="version" content="3.4">
<title>GymTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
  <h1>GymTrack</h1>
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="header-date" id="headerDate"></span>
    <button onclick="toggleLang()" id="langBtn"
      style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px 10px;color:var(--text);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">EN</button>
  </div>
</div>

<!-- ===== PAGES ===== -->

<!-- Training / Log -->
<div class="page active" id="page-log">
  <div class="section-title" id="ttlStartTraining">Training starten</div>
  <div id="quickStart">
    <button class="btn btn-primary" id="btnNewWorkout" onclick="openNewWorkout()">+ Neues Training</button>
    <button class="btn btn-secondary" id="btnFromTemplate" onclick="showPage('templates', document.querySelector('.nav-btn[data-page=templates]'))">📋 Aus Vorlage starten</button>
    <div class="divider"></div>
    <div class="section-title" style="font-size:18px;" id="ttlLastWorkouts">Letzte Trainings</div>
    <div id="recentWorkouts"></div>
  </div>
  <div id="activeWorkout" style="display:none;">
    <div class="workout-header">
      <div>
        <div id="activeWorkoutLabel" style="font-size:13px;color:var(--muted);">Aktives Training</div>
        <div class="timer-display" id="timerDisplay">00:00</div>
      </div>
      <button id="btnFinishWorkout" class="btn btn-primary" style="width:auto;padding:10px 20px;" onclick="finishWorkout()">Fertig ✓</button>
    </div>
    <div id="workoutExercises"></div>
    <button id="btnAddExercise" class="btn btn-secondary" onclick="openExercisePicker()">+ Übung hinzufügen</button>
    <button id="btnCancelWorkout" class="btn btn-danger" onclick="cancelWorkout()">Training abbrechen</button>
  </div>
</div>

<!-- Templates -->
<div class="page" id="page-templates">
  <div class="section-title" id="ttlTemplates">Vorlagen</div>
  <button class="btn btn-primary btn-sm" id="btnCreateTemplate" onclick="openCreateTemplate()">+ Vorlage erstellen</button>
  <div class="divider"></div>
  <div id="templatesList"></div>
</div>

<!-- Exercises -->
<div class="page" id="page-exercises">
  <div class="section-title" id="ttlExercises">Meine Übungen</div>
  <button class="btn btn-primary btn-sm" id="btnCreateExercise" onclick="openAddExercise()">+ Übung erstellen</button>
  <div class="divider"></div>
  <div id="exercisesList"></div>
</div>

<!-- History -->
<div class="page" id="page-history">
  <div class="section-title" id="ttlHistory">Verlauf</div>
  <div id="historyList"></div>
</div>

<!-- Calendar -->
<div class="page" id="page-calendar">
  <div class="cal-header">
    <button class="cal-nav" onclick="calPrevMonth()">‹</button>
    <div class="cal-month" id="calMonthLabel"></div>
    <button class="cal-nav" onclick="calNextMonth()">›</button>
  </div>
  <div class="cal-streak" id="calStreak"></div>
  <div class="cal-grid" id="calDayLabels"></div>
  <div style="height:8px;"></div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- Stats -->
<div class="page" id="page-stats">
  <div class="section-title" id="ttlStats">Statistiken</div>
  <div class="stats-grid" id="statsGrid"></div>
  <div class="section-title" style="font-size:18px;" id="ttlProgress">Progress pro Übung</div>
  <div id="progressList"></div>
  <div class="divider"></div>
  <div class="section-title" style="font-size:18px;" id="ttlData">Daten</div>
  <button class="btn btn-secondary" id="btnExport" onclick="openExportModal()" style="margin-bottom:10px;">📤 Daten exportieren</button>
  <button class="btn btn-secondary" id="btnImport" onclick="openImportModal()">📥 Daten importieren</button>
</div>

<!-- ===== NAV ===== -->
<nav class="nav">
  <button class="nav-btn active" data-page="log" onclick="showPage('log',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    Training
  </button>
  <button class="nav-btn" data-page="templates" onclick="showPage('templates',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
    Vorlagen
  </button>
  <button class="nav-btn" data-page="exercises" onclick="showPage('exercises',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    Übungen
  </button>
  <button class="nav-btn" data-page="history" onclick="showPage('history',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Verlauf
  </button>
  <button class="nav-btn" data-page="calendar" onclick="showPage('calendar',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Kalender
  </button>
  <button class="nav-btn" data-page="stats" onclick="showPage('stats',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Stats
  </button>
</nav>

<!-- ===== MODALS ===== -->

<!-- Exercise Picker -->
<div class="modal-overlay" id="exercisePickerModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div class="modal-title" id="ttlChooseExercise">Übung wählen</div>
      <div class="close-btn" onclick="closeSubModal('exercisePickerModal')">✕</div>
    </div>
    <div id="exercisePickerList"></div>
  </div>
</div>

<!-- Add / Edit Exercise -->
<div class="modal-overlay" id="addExerciseModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div class="modal-title" id="addExerciseTitle">Neue Übung</div>
      <div class="close-btn" onclick="closeModal('addExerciseModal')">✕</div>
    </div>
    <div class="form-group">
      <label class="form-label" id="lblExName">Name</label>
      <input class="form-input" id="exName" placeholder="z.B. Bankdrücken">
    </div>
    <div class="form-group">
      <label class="form-label" id="lblExCategory">Kategorie</label>
      <select class="form-input" id="exCategory" onchange="updateCategoryHint()">
        <option value="Brust">Brust</option>
        <option value="Rücken">Rücken</option>
        <option value="Schultern">Schultern</option>
        <option value="Arme">Arme</option>
        <option value="Beine">Beine</option>
        <option value="Core">Core</option>
        <option value="Cardio">Cardio</option>
        <option value="Dehnen">Dehnen</option>
      </select>
    </div>
    <div id="categoryHint" style="font-size:12px;color:var(--muted);margin-bottom:14px;padding:10px 12px;background:var(--surface2);border-radius:8px;"></div>
    <div class="form-group">
      <label class="form-label" id="lblExNotes">Notizen</label>
      <textarea class="form-input" id="exNotes" placeholder="z.B. Schulterblätter zusammenziehen..." style="resize:none;height:80px;line-height:1.5;"></textarea>
    </div>
    <button class="btn btn-primary" onclick="saveExercise()" id="btnSaveExercise">Speichern</button>
    <button class="btn btn-danger" id="deleteExBtn" style="display:none;" onclick="deleteExercise()">Übung löschen</button>
    <button class="btn btn-secondary" onclick="closeModal('addExerciseModal')" id="btnCancelExercise">Abbrechen</button>
  </div>
</div>

<!-- Log Sets (adapts to category type) -->
<div class="modal-overlay" id="logSetsModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <div class="modal-title" id="logSetsTitle"></div>
      <div class="close-btn" onclick="closeSubModal('logSetsModal')">✕</div>
    </div>
    <div id="lastPerformance" style="margin-bottom:16px;"></div>
    <div class="set-col-labels" id="setColLabels">
      <div></div>
      <div class="set-col-label" id="colLabel1">kg</div>
      <div class="set-col-label" id="colLabel2">Wdh</div>
      <div></div>
    </div>
    <div class="sets-container" id="setsContainer"></div>
    <button class="btn btn-secondary btn-sm" id="btnAddRow" onclick="addSetRow()">+ Satz</button>
    <div style="margin-top:16px;">
      <label class="form-label" id="lblSessionNote">Anmerkung (optional)</label>
      <textarea class="form-input" id="sessionNote" placeholder="z.B. Schulter hat gezwickt..." style="resize:none;height:70px;line-height:1.5;margin-bottom:12px;"></textarea>
      <button class="btn btn-primary" id="btnSaveSets" onclick="saveSets()">Sätze speichern</button>
    </div>
  </div>
</div>

<!-- Template Modal -->
<div class="modal-overlay" id="templateModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div class="modal-title" id="templateModalTitle">Vorlage erstellen</div>
      <div class="close-btn" onclick="closeModal('templateModal')">✕</div>
    </div>
    <div class="form-group">
      <label class="form-label" id="lblTmplName">Name</label>
      <input class="form-input" id="tmplName" placeholder="z.B. Push Day">
    </div>
    <div class="form-group">
      <label class="form-label" id="lblTmplEx">Übungen</label>
      <div id="tmplExerciseList" style="margin-bottom:8px;"></div>
      <button class="btn btn-secondary btn-sm" id="btnAddExToTemplate" onclick="openTmplExPicker()">+ Übung hinzufügen</button>
    </div>
    <button class="btn btn-primary" style="margin-top:8px;" onclick="saveTemplate()" id="btnSaveTemplate">Speichern</button>
    <button class="btn btn-danger" id="deleteTmplBtn" style="display:none;" onclick="deleteTemplate()">Vorlage löschen</button>
    <button class="btn btn-secondary" onclick="closeModal('templateModal')" id="btnCancelTemplate">Abbrechen</button>
  </div>
</div>

<!-- Template Exercise Picker -->
<div class="modal-overlay" id="tmplExPickerModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <div class="modal-title" id="ttlTmplExPicker">Übungen auswählen</div>
      <div class="close-btn" onclick="closeTmplExPicker()">✕</div>
    </div>
    <div id="tmplPickerSelectedCount" style="font-size:13px;color:var(--accent);font-weight:600;margin-bottom:12px;min-height:20px;"></div>
    <div id="tmplExPickerList"></div>
    <div style="margin-top:16px;">
      <button class="btn btn-primary" id="btnConfirmTmplEx" onclick="confirmTmplExSelection()">Hinzufügen</button>
    </div>
  </div>
</div>

<!-- Edit Past Workout -->
<div class="modal-overlay" id="editWorkoutModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <div class="modal-title" id="editWorkoutTitle"></div>
      <div class="close-btn" onclick="closeEditWorkout()">✕</div>
    </div>
    <div id="editWorkoutExercises"></div>
    <button class="btn btn-secondary" id="btnEditWorkoutAddEx" style="margin-top:12px;" onclick="openExercisePickerForEdit()">+ Übung hinzufügen</button>
    <button class="btn btn-primary" id="btnSaveEditWorkout" style="margin-top:10px;" onclick="saveEditWorkout()">✓ Änderungen speichern</button>
  </div>
</div>

<!-- Calendar Day Detail -->
<div class="modal-overlay" id="calDayModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <div class="modal-title" id="calDayTitle"></div>
      <div class="close-btn" onclick="closeModal('calDayModal')">✕</div>
    </div>
    <div id="calDayContent"></div>
  </div>
</div>

<!-- Export -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <div class="modal-title" id="ttlExport">Daten exportieren</div>
      <div class="close-btn" onclick="closeModal('exportModal')">✕</div>
    </div>
    <p id="txtExportDesc" style="font-size:14px;color:var(--muted);margin-bottom:16px;"></p>
    <textarea id="exportText" readonly style="width:100%;height:120px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:12px;font-family:monospace;resize:none;outline:none;"></textarea>
    <button class="btn btn-primary" style="margin-top:12px;" id="btnCopyExport" onclick="copyExport()">📋 Code kopieren</button>
    <div id="copyConfirm" style="display:none;text-align:center;color:var(--accent);font-size:14px;margin-top:10px;font-weight:600;"></div>
    <button class="btn btn-secondary" id="btnCloseExport" onclick="closeModal('exportModal')">Schließen</button>
  </div>
</div>

<!-- Import -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <div class="modal-title" id="ttlImport">Daten importieren</div>
      <div class="close-btn" onclick="closeModal('importModal')">✕</div>
    </div>
    <p id="txtImportDesc" style="font-size:14px;color:var(--muted);margin-bottom:4px;"></p>
    <p id="txtImportWarn" style="font-size:12px;color:var(--accent2);margin-bottom:16px;"></p>
    <textarea id="importText" placeholder="Export-Code hier einfügen..." style="width:100%;height:120px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:12px;font-family:monospace;resize:none;outline:none;"></textarea>
    <button class="btn btn-primary" style="margin-top:12px;" id="btnDoImport" onclick="doImport()">✓ Importieren</button>
    <button class="btn btn-secondary" id="btnCancelImport" onclick="closeModal('importModal')">Abbrechen</button>
  </div>
</div>

<!-- ===== SCRIPTS (order matters) ===== -->
<script src="js/db.js"></script>
<script src="js/i18n.js"></script>
<script src="js/modals.js"></script>
<script src="js/nav.js"></script>
<script src="js/workout.js"></script>
<script src="js/exercises.js"></script>
<script src="js/history.js"></script>
<script src="js/stats.js"></script>
<script src="js/templates.js"></script>
<script src="js/calendar.js"></script>
<script src="js/editWorkout.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
